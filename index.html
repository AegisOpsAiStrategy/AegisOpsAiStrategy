<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis Strategic Operations | Growth Ops (Content + Automation)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#0D1B2A;
      --dark-blue:#1B263B;
      --cyan:#00E5FF;
      --gold:#B89E6B;
      --white:#FFFFFF;
      --slate:#94A3B8;

      --card: rgba(27,38,59,.78);
      --border: rgba(255,255,255,.10);
      --border-strong: rgba(0,229,255,.35);

      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 14px;

      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(0,229,255,.12), transparent 60%),
        radial-gradient(900px 500px at 20% 10%, rgba(184,158,107,.10), transparent 55%),
        var(--navy);
      color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; }
    .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 20px; }
    .section { padding: 64px 0; }
    .section-tight { padding: 40px 0; }

    /* Accessibility */
    .skip-link{
      position:absolute; left:-999px; top: 10px;
      background: var(--cyan); color: var(--navy);
      padding: 10px 14px; border-radius: 10px; font-weight: 900;
      z-index: 9999;
    }
    .skip-link:focus{ left: 10px; }

    /* Nav */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(13,27,42,.72);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .nav-inner {
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 0;
      gap: 16px;
    }
    .brand {
      display:flex; align-items:center; gap: 10px; text-decoration:none;
      font-weight: 900; letter-spacing: .6px;
      white-space: nowrap;
    }
    .brand-badge{
      width: 30px; height: 30px; border-radius: 10px;
      background: rgba(0,229,255,.14);
      border: 1px solid rgba(0,229,255,.30);
      display:grid; place-items:center;
      box-shadow: 0 0 0 6px rgba(0,229,255,.05);
    }
    .nav-links{
      display:flex; gap: 10px; flex-wrap: wrap; justify-content:flex-end;
      font-weight: 800;
      color: rgba(255,255,255,.85);
    }
    .nav-links a{
      text-decoration:none;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .nav-links a:hover{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
    }

    /* Buttons */
    .btn {
      display:inline-flex; align-items:center; justify-content:center;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration:none;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .8px;
      border: 1px solid transparent;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
      cursor: pointer;
      user-select:none;
    }
    .btn-primary{
      background: var(--cyan);
      color: var(--navy);
      box-shadow: 0 10px 35px rgba(0,229,255,.20);
    }
    .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 14px 50px rgba(0,229,255,.26); background: #bff7ff; }
    .btn-ghost{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.12);
      color: var(--white);
    }
    .btn-ghost:hover{ transform: translateY(-2px); background: rgba(255,255,255,.06); }
    .btn:focus-visible{ outline: 3px solid rgba(0,229,255,.35); outline-offset: 2px; }
    .btn[aria-disabled="true"] { opacity: .55; cursor: not-allowed; pointer-events: none; }

    /* Hero */
    header.hero {
      padding: 70px 0 36px;
      border-bottom: 1px solid rgba(0,229,255,.18);
      background: radial-gradient(circle at 50% 10%, rgba(27,38,59,.95), rgba(13,27,42,.75));
    }
    .hero-grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 28px;
      align-items: center;
    }
    @media (max-width: 900px){
      .hero-grid{ grid-template-columns: 1fr; }
    }
    .hero-logo {
      width: 110px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.35));
      margin-bottom: 18px;
    }
    .kicker{
      color: var(--gold);
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-size: .92rem;
      margin: 0 0 10px;
    }
    h1{
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      margin: 0 0 10px;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: -1.2px;
    }
    .subtitle{
      margin: 0;
      font-size: 1.05rem;
      color: rgba(255,255,255,.78);
      max-width: 70ch;
    }
    .status-terminal{
      margin-top: 14px;
      color: var(--cyan);
      font-size: .82rem;
      letter-spacing: 2px;
      opacity: .95;
    }
    .hero-actions{
      display:flex; gap: 12px; flex-wrap: wrap;
      margin-top: 18px;
    }

    /* Section headers */
    .h2{
      font-size: 1.55rem;
      color: var(--gold);
      text-transform: uppercase;
      border-left: 4px solid var(--cyan);
      padding-left: 14px;
      margin: 0 0 18px;
      letter-spacing: .5px;
    }
    .lede{
      color: var(--slate);
      margin: 0 0 22px;
      max-width: 95ch;
    }

    /* Grid + Cards */
    .grid {
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }
    .col-4{ grid-column: span 4; }
    .col-5{ grid-column: span 5; }
    .col-6{ grid-column: span 6; }
    .col-7{ grid-column: span 7; }
    .col-8{ grid-column: span 8; }
    .col-12{ grid-column: span 12; }

    @media (max-width: 900px){
      .col-4,.col-5,.col-6,.col-7,.col-8{ grid-column: span 12; }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .card:before{
      content:"";
      position:absolute; inset:-1px;
      background: radial-gradient(600px 120px at 30% 0%, rgba(0,229,255,.12), transparent 55%);
      pointer-events:none;
      opacity: .9;
    }
    .card > * { position: relative; }
    .card:hover{ border-color<span class="ml-2" /><span class="inline-block w-3 h-3 rounded-full bg-neutral-a12 align-middle mb-[0.1rem]" />
