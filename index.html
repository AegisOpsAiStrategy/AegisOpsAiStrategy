<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Ops AI Strategy</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --cyan: #64ffda;
            --gold: #ffcf40;
            --white: #e6f1ff;
        }
        body {
            background-color: var(--dark-blue);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.2);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 { color: var(--cyan); }
        p { line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <img src="laron-profile.jpg" alt="Laron Profile" class="profile-img">
            
            <h1>Laron - AI Strategist</h1>
            <p>Welcome to Aegis Ops AI Strategy. We specialize in cutting-edge AI implementation and operational security.</p>
        </div>
    </div>

</body>
</html>
