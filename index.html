<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Ops & AI Strategy | Enterprise Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --dark-blue: #1B263B;
            --cyan: #00E5FF;
            --gold: #B89E6B;
            --white: #FFFFFF;
            --slate: #778899;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            width: 100%;
        }

        /* --- Header: Now scrolls away --- */
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(to bottom, var(--dark-blue), var(--navy));
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            position: relative; /* It will now disappear when you scroll */
            width: 100%;
        }

        .hero-logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--gold);
            margin: 5px 0;
        }

        .status-terminal {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 0.65rem;
            margin-top: 15px;
        }

        /* --- Layout --- */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        section {
            margin-bottom: 60px;
        }

        h2 {
            font-size: 1.4rem;
            color: var(--gold);
            text-transform: uppercase;
            border-left: 4px solid var(--cyan);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        /* --- Components --- */
        .card {
            background: var(--dark-blue);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .price {
            font-size: 2rem;
            color: var(--cyan);
            font-weight: 900;
            margin: 10px 0;
        }

        .btn {
            background: var(--cyan);
            color: var(--navy);
            padding: 18px;
            text-decoration: none;
            font-weight: 900;
            border-radius: 4px;
            display: block;
            text-align: center;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .beta-alert {
            background: rgba(184, 158, 107, 0.1);
            border: 1px dashed var(--gold);
            padding: 20px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.7rem;
            color: var(--slate);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <img src="shield.png" alt="Aegis Logo" class="hero-logo" onerror="this.style.display='none'">
        <h1>AI Ops & Strategy</h1>
