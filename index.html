<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Ops & AI Strategy | Enterprise-Grade Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --dark-blue: #1B263B;
            --cyan: #00E5FF;
            --gold: #B89E6B;
            --white: #FFFFFF;
            --slate: #778899;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
        }

        /* --- Header & Hero Section --- */
        header {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .hero-logo {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            margin-bottom: 25px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin: 0 0 10px 0;
            color: var(--white);
            text-transform: uppercase;
        }
        
        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 700;
            margin: 0;
        }

        .status-terminal {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 0.8rem;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* --- Section Styling --- */
        h2 {
            font-size: 1.8rem;
            color: var(--gold);
            text-transform: uppercase;
            border-left: 4px solid var(--cyan);
            padding-left: 20px;
            margin-bottom: 40px;
        }
        
        .section-intro {
            max-width: 800px;
            margin: -20px auto 40px auto;
            text-align: center;
            font-size: 1.1rem;
            color: var(--slate);
        }

        /* --- NEW: Values Section --- */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .value-card {
            background-color: var(--dark-blue);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        .value-card h3 {
            color: var(--cyan);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        .value-card h3 span {
            font-weight: 900;
            color: var(--gold);
        }

        /* --- Leadership Section --- */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .profile-card {
            background: var(--dark-blue);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
        }

        .profile-card h3 {
            color: var(--cyan);
            margin: 10px 0;
            font-size: 1.4rem;
        }

        .title-tag {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        
        .profile-card p {
            color: var(--slate);
        }

        /* --- Founder's Alert Section --- */
        .beta-alert {
            background: rgba(184, 158, 107, 0.1);
            border: 1px dashed var(--gold);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            margin: 60px 0;
        }

        .slots-count {
            display: block;
            margin-top: 15px;
            color: var(--cyan);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* --- Pricing Section --- */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .pricing-card {
            background: var(--dark-blue);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }
        .pricing-card.highlight {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
